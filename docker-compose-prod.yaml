services:
  nextjs:
    container_name: 8inf886_projet_1-web
    build:
      context: ./
      dockerfile: Dockerfile.prod
    restart: always
    ports:
      - ${WEB_PORT}:3000
    environment:
      - NODE_ENV=production
      - AUTH_SECRET=${AUTH_SECRET}
      - SECRET_COOKIE_PASSWORD=${SECRET_COOKIE_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_PORT=${DB_PORT}

    # depends_on:
    #   mysql:
    #     condition: service_healthy
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:3000"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 40s

mysql:
    container_name: 8inf886_projet_1-db
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - ${DB_PORT}:3306
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
    driver: local
